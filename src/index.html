<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="settings">
      <header class="settings__header">
        <h1>Settings</h1>
        <p>Update your profile and choose a theme.</p>
      </header>

      <form id="settings-form" class="settings__form" novalidate>
        <fieldset class="settings__fieldset">
          <legend class="visually-hidden">Profile and appearance</legend>

          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              autocomplete="name"
              aria-describedby="name-error"
              required
            />
            <span id="name-error" class="error-message" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              aria-describedby="email-error"
              required
            />
            <span id="email-error" class="error-message" role="alert"></span>
          </div>

          <div class="form-group">
            <label for="theme">Theme</label>
            <select id="theme" name="theme" aria-describedby="theme-hint">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
            <span id="theme-hint" class="hint">Choose light or dark mode.</span>
          </div>
        </fieldset>

        <button type="submit" id="save-btn" class="btn-save" disabled>
          Save
        </button>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
